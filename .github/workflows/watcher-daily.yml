name: Watcher daily run

on:
  schedule:
    # GitHub Actions cron is best-effort and often delayed 1–2 h.
    # Both crons fire daily; dedupe in the watcher absorbs any duplicate.
    - cron: '0 4 * * *'   # ~06:00 Europe/Stockholm during CEST (summer)
    - cron: '0 5 * * *'   # ~06:00 Europe/Stockholm during CET  (winter)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: watcher-daily
  cancel-in-progress: false

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pipeline
        env:
          BERGET_API_KEY: ${{ secrets.BERGET_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: berget
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: bun run agents/orchestrator/pipeline.ts

      - name: Commit JSONL if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACKED_FILES="agents/watcher/data/events.jsonl agents/orchestrator/data/classifications.jsonl agents/orchestrator/data/deliveries.jsonl"
          if [ -z "$(git status --porcelain $TRACKED_FILES)" ]; then
            echo "No changes in events/classifications/deliveries JSONL — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ='Europe/Stockholm' date +%Y-%m-%d)
          git add $TRACKED_FILES
          git commit -m "watcher: daily run $DATE"
          git push origin HEAD:${GITHUB_REF#refs/heads/}
